<div class="tab-container">
  <button
    type="button"
    class="tab-btn active"
    id="tab-btn-ingredient"
    onclick="handleGlobalTabSwitch('ingredient')"
  >
    Nguyên liệu
  </button>
  <button
    type="button"
    class="tab-btn"
    id="tab-btn-package"
    onclick="handleGlobalTabSwitch('package')"
  >
    Đóng gói
  </button>
</div>

<div class="ingredients-container" id="ingredients-main-box">
  <div class="input-section">
    <h3 class="title-primary" id="form-title">Thêm Nguyên Liệu</h3>

    <input type="hidden" id="ing-type" value="ingredient" />

    <div class="input-group">
      <label id="lbl-ing-name"
        >Tên nguyên liệu <span class="required">*</span></label
      >
      <input type="text" id="ing-name" placeholder="Nhập tên vật tư..." />
    </div>

    <div class="input-group">
      <label>Giá mua (VNĐ)</label>
      <input
        type="text"
        inputmode="decimal"
        id="ing-total-price"
        placeholder="0"
        oninput="
          window.formatInputOnType(this);
          calculateUnitPrice();
        "
      />
    </div>

    <div class="input-group">
      <label>Số lượng mua</label>
      <div class="qty-unit-flex">
        <input
          type="text"
          inputmode="decimal"
          id="ing-total-qty"
          placeholder="0"
          class="qty-input-fix"
          oninput="
            window.formatInputOnType(this);
            calculateUnitPrice();
          "
        />
        <select id="ing-unit" onchange="calculateUnitPrice()">
          <option value="gam">Gam (g)</option>
          <option value="ml">Mililit (ml)</option>
          <option value="cái">Cái</option>
          <option value="quả">Quả</option>
        </select>
      </div>
    </div>

    <div class="unit-price-box">
      <small id="lbl-unit-price-display">Giá trên 1 đơn vị:</small>
      <div id="unit-price-display">0 đ</div>
    </div>

    <div class="input-group">
      <label>Ghi chú</label>
      <textarea
        id="ing-note"
        placeholder="Mua ở tiệm đầu ngõ..."
        rows="2"
      ></textarea>
    </div>

    <div class="form-actions-container">
      <button
        type="button"
        id="save-btn"
        class="btn-primary"
        onclick="saveIngredient()"
      >
        Lưu thông tin
      </button>

      <button
        type="button"
        class="btn-secondary btn-delete"
        onclick="resetForm()"
        title="Xóa trống form"
      >
        <img
          src="src/renderer/assets/trash.svg"
          alt="Trash Icon"
          class="icon"
        />
      </button>
    </div>
  </div>

  <div class="list-section">
    <div class="search-wrapper">
      <input
        type="text"
        id="ing-search"
        placeholder="🔍 Tìm kiếm tên vật tư..."
        oninput="searchIng()"
      />
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th class="th-stt">STT</th>
            <th class="th-name" id="th-dynamic-name">Tên nguyên liệu</th>
            <th class="th-price">Giá trên 1 đơn vị</th>
            <th class="th-note">Ghi chú</th>
            <th class="th-action">Hành động</th>
          </tr>
        </thead>
        <tbody id="ing-list-body"></tbody>
      </table>
    </div>

    <div id="pagination-container" class="pagination-wrapper"></div>
  </div>
</div>
