<div>
  <div class="page-header">
    <h2 class="title-primary">
      <img src="src/renderer/assets/inventory.svg" alt="Inventory Icon" /> Menu
      Bánh Quản Lý Kho
    </h2>
    <div class="header-actions">
      <div class="search-wrapper">
        <input
          type="text"
          id="inventory-search"
          placeholder="🔍 Tìm tên vật tư..."
          oninput="window.searchInventory()"
        />
      </div>
      <button class="btn-primary" onclick="window.openImportModal()">
        + Nhập Kho
      </button>
    </div>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th style="width: 5%">STT</th>
          <th style="width: 25%">Tên vật tư</th>
          <th style="width: 15%">Đơn vị</th>
          <th style="width: 15%">Tổng Tồn Kho</th>
          <th style="width: 25%">Trạng thái</th>
          <th style="width: 15%">Thao tác</th>
        </tr>
      </thead>
      <tbody id="inventory-list-body"></tbody>
    </table>
  </div>
  <div id="inventory-pagination" class="pagination-wrapper"></div>
</div>

<div id="import-modal" class="modal-overlay" style="display: none">
  <div id="import-modal-card" class="modal-card">
    <div class="modal-header">
      <h3>Thêm Lô Hàng Mới</h3>
      <button class="btn-close-modal" onclick="window.closeImportModal()">
        ✕
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Chọn vật tư:</label>
        <select id="imp-ing-id"></select>
      </div>
      <div class="form-row-inv">
        <div class="form-group half-width">
          <label>Số lượng nhập <span class="required">*</span></label>
          <input
            type="number"
            id="imp-qty"
            placeholder="0.00"
            min="0.1"
            step="0.1"
          />
        </div>
        <div class="form-group half-width">
          <label
            >Tổng giá nhập (cho lô hàng này)
            <span class="required">*</span></label
          >
          <input
            type="text"
            id="imp-purchase-price"
            placeholder="0"
            oninput="window.formatInputOnType(this)"
          />
        </div>
      </div>
      <div class="form-row-inv">
        <div class="form-group half-width">
          <label>Hạn sử dụng (Expiry):</label>
          <input type="date" id="imp-expiry" />
        </div>
        <div class="form-group half-width"></div>
      </div>
      <div class="form-group">
        <label>Ghi chú lô hàng (Nguồn cung cấp...):</label>
        <textarea id="imp-note" placeholder="Nhập ghi chú..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="window.closeImportModal()">
        Hủy
      </button>
      <button class="btn-primary" onclick="window.saveImport()">Lưu kho</button>
    </div>
  </div>
</div>

<div id="batch-modal" class="modal-overlay" style="display: none">
  <div class="modal-card batch-card">
    <div class="modal-header">
      <h3>Chi tiết lô hàng</h3>
      <div class="header-actions">
        <button class="btn-close-modal" onclick="window.closeBatchModal()">
          ✕
        </button>
      </div>
    </div>
    <div class="modal-body">
      <h3 id="batch-ingredient-name"></h3>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Ngày nhập</th>
              <th>SL Ban đầu</th>
              <th>Giá mua (Tổng/Đơn vị)</th>
              <th>Còn lại</th>
              <th>Hạn sử dụng</th>
              <th>Ghi chú</th>
            </tr>
          </thead>
          <tbody id="batch-list-body"></tbody>
        </table>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="window.closeBatchModal()">
        Đóng
      </button>
    </div>
  </div>
</div>
