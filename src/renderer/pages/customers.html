<div>
  <div class="page-header">
    <h2 class="title-primary">
      <img src="src/renderer/assets/customers.svg" alt="Customers Icon" /> Quản
      Lý Khách Hàng
    </h2>
    <div class="header-actions">
      <div class="search-wrapper">
        <input
          type="text"
          id="customer-search"
          placeholder="🔍 Tìm theo tên hoặc SĐT..."
          oninput="window.searchCustomers()"
        />
      </div>
      <button class="btn-primary" onclick="window.openCustomerModal('add')">
        + Thêm khách hàng
      </button>
    </div>
  </div>

  <div class="table-container">
    <table class="customers-table">
      <thead>
        <tr>
          <th class="col-stt text-center">STT</th>
          <th class="col-name">Tên khách hàng</th>
          <th class="col-phone text-center">Số điện thoại</th>
          <th class="col-stats">Lịch sử mua hàng</th>
          <th class="col-address">Địa chỉ giao hàng</th>
          <th class="col-action text-center">Thao tác</th>
        </tr>
      </thead>
      <tbody id="customer-list-body"></tbody>
    </table>
  </div>
  <div id="customer-pagination" class="pagination-wrapper"></div>
</div>

<div id="customer-modal" class="modal-overlay">
  <div class="modal-card customer-modal-card">
    <div class="modal-header">
      <h3 id="c-modal-title">Thêm Khách Hàng</h3>
      <button class="btn-close-modal" onclick="window.closeCustomerModal()">
        ✕
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Tên khách hàng <span class="required">*</span></label>
        <input type="text" id="c-name" placeholder="Nhập tên khách hàng..." />
      </div>
      <div class="form-group mt-15">
        <label>Số điện thoại</label>
        <input type="text" id="c-phone" placeholder="VD: 0912345678" />
      </div>
      <div class="form-group mt-15">
        <label>Địa chỉ</label>
        <textarea
          id="c-address"
          rows="3"
          placeholder="Nhập địa chỉ nhận bánh thường xuyên..."
        ></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="window.closeCustomerModal()">
        Hủy bỏ
      </button>
      <button class="btn-primary" onclick="window.saveCustomer()">
        Lưu thông tin
      </button>
    </div>
  </div>
</div>
