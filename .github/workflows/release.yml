name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # Cấp quyền ghi để tạo và tải lên Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Cập nhật lên Node 22 LTS để tương thích với @electron/rebuild v4
          cache: "npm"

      - name: Install dependencies
        run: npm install

      # Quan trọng: Rebuild sqlite3 để tương thích với môi trường chạy
      - name: Rebuild SQLite3
        run: npm run rebuild

      - name: Build and Publish Electron App
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build -- --publish always
        shell: pwsh
